# Static SPA server for the MetricLens dashboard.
# Listens on 8080 (the unprivileged nginx default and Cloud Run's port).
server {
    listen 8080;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Long-cache fingerprinted assets.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Lightweight liveness endpoint for Cloud Run health checks.
    location = /healthz {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }

    # SPA fallback: unknown routes resolve to the app shell.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
