<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720"><rect width="1280" height="720" fill="#ffffff"/><text x="640.0" y="60" font-size="18" fill="#16191d" font-weight="bold" text-anchor="middle" font-family="NanumGothic, Helvetica, Arial, sans-serif">MetricLens 접근법: 예측에서 SLO 제약 정수계획(integer programming) 리사이징까지</text><rect x="38.0" y="350" width="184" height="132" rx="9" fill="#ffffff" stroke="#16191d"/><circle cx="60.0" cy="393.0" r="13" fill="#1f77b4"/><text x="60.0" y="397.0" font-size="13" fill="#fff" font-weight="bold" text-anchor="middle" font-family="NanumGothic, Helvetica, Arial, sans-serif">1</text><text x="82.0" y="398.0" font-size="14" fill="#16191d" font-weight="bold" text-anchor="start" font-family="NanumGothic, Helvetica, Arial, sans-serif">메트릭 이력</text><text x="54.0" y="425.0" font-size="11.5" fill="#454b52" font-weight="normal" text-anchor="start" font-family="NanumGothic, Helvetica, Arial, sans-serif">CPU · 메모리 · 네트워크</text><text x="54.0" y="443.0" font-size="11.5" fill="#454b52" font-weight="normal" text-anchor="start" font-family="NanumGothic, Helvetica, Arial, sans-serif">시계열 (시간단위)</text><rect x="242.0" y="350" width="184" height="132" rx="9" fill="#ffffff" stroke="#16191d"/><circle cx="264.0" cy="393.0" r="13" fill="#1f77b4"/><text x="264.0" y="397.0" font-size="13" fill="#fff" font-weight="bold" text-anchor="middle" font-family="NanumGothic, Helvetica, Arial, sans-serif">2</text><text x="286.0" y="398.0" font-size="14" fill="#16191d" font-weight="bold" text-anchor="start" font-family="NanumGothic, Helvetica, Arial, sans-serif">분해 + AR 보정</text><text x="258.0" y="425.0" font-size="10.5" fill="#454b52" font-weight="normal" text-anchor="start" font-family="NanumGothic, Helvetica, Arial, sans-serif">추세(trend) + 계절(seasonal)</text><text x="258.0" y="443.0" font-size="10.5" fill="#454b52" font-weight="normal" text-anchor="start" font-family="NanumGothic, Helvetica, Arial, sans-serif">+ rho·잔차 → 예측(forecast)</text><l