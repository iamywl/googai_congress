<svg xmlns="http://www.w3.org/2000/svg" width="1180" height="660" viewBox="0 0 1180 660"><rect width="1180" height="660" fill="#ffffff"/><text x="590.0" y="30" font-size="15" fill="#16191d" font-weight="bold" text-anchor="middle" font-family="DejaVu Sans">MetricLens computation pipeline: from a raw metric series to an SLO-safe integer allocation</text><rect x="40" y="44" width="1100" height="34" rx="8" fill="#f4f6f8" stroke="#16191d"/><text x="56" y="65" font-size="12" fill="#454b52" font-weight="bold" text-anchor="start" font-family="DejaVu Sans">Decomposition model:</text><text x="190" y="66" font-size="14.5" fill="#16191d" font-weight="normal" text-anchor="start" font-family="DejaVu Sans Mono, Consolas, monospace"><tspan>y</tspan><tspan dy="4.9" font-size="10.4">t</tspan><tspan dy="-4.9" font-size="14.5"></tspan><tspan> = T</tspan><tspan dy="4.9" font-size="10.4">t</tspan><tspan dy="-4.9" font-size="14.5"></tspan><tspan> + S</tspan><tspan dy="4.9" font-size="10.4">t mod m</tspan><tspan dy="-4.9" font-size="14.5"></tspan><tspan> + r</tspan><tspan dy="4.9" font-size="10.4">t</tspan><tspan dy="-4.9" font-size="14.5"></tspan></text><text x="1124" y="65" font-size="11" fill="#454b52" font-weight="normal" text-anchor="end" font-family="DejaVu Sans">m = period</text><text x="40" y="104" font-size="12.5" fill="#1f77b4" font-weight="bold" text-anchor="start" font-family="DejaVu Sans">A. Forecasting  —  seasonal-trend decomposition + AR(1) residual correction  (CPU-only, stdlib)</text><rect x="42.0" y="116" width="200" height="132" rx="9" fill="#ffffff" stroke="#16191d"/><rect x="42.0" y="116" width="200" height="26" rx="9" fill="#1f77b4"/><rect x="42.0" y="130" width="200" height="12" fill="#1f77b4"/><text x="53.0" y="134" font-size="11.5" fill="#ffffff" font-weight="bold" text-anchor="start" font-family="NanumGothic, Helvetica, Arial, sans-serif">1. Trend (OLS)</text><text x="54.0" y="164" font-size="12.5" fill="#16191d" font-weight="normal" text-anchor="start" font-family="DejaVu Sans Mono, Consolas, monospace"><tspan>T</tspan><tspan dy="4.2" font-size="9.0">t</tspan><tspan dy="-4.2" font-size="12.5"></tspan><tspan> = b.t + a</tspan></text><text x="54.0" y="186" font-size="12.5" fill="#16191d" font-weight="normal" text-anchor="start" font-family="DejaVu Sans Mono, Consolas, monospace"><tspan>block means y</tspan><tspan dy="4.2" font-size="9.0">k</tspan><tspan dy="-4.2" font-size="12.5"></tspan><tspan>,</tspan></text><text x="54.0" y="208" font-size="12.5" fill="#16191d" font-weight="normal" text-anchor="start" font-family="DejaVu Sans Mono, Consolas, monospace"><tspan>centres c</tspan><tspan dy="4.2" font-size="9.0">k</tspan><tspan dy="-4.2" font-size="12.5"></tspan><tspan> (deseason)</tspan></text><rect x="266.0" y="116" width="200" height="132" rx="9" fill="#ffffff" stroke="#16191d"/><rect x="266.0" y="116" width="200" height="26" rx="9" fill="#1f77b4"/><rect x="266.0" y="130" width="200" height="12" fill="#1f77b4"/><text x="277.0" y="134" font-size="11.5" fill="#ffffff" font-weight="bold" text-anchor="start" font-family="NanumGothic, Helvetica, Arial, sans-serif">2. Seasonal index</text><text x="278.0" y="164" font-size="12.5" fill="#16191d" font-weight="normal" text-anchor="start" font-family="DejaVu Sans Mono, Consolas, monospace"><tspan>d</tspan><tspan dy="4.2" font-size="9.0">t</tspan><tspan dy="-4.2" font-size="12.5"></tspan><tspan> = y</tspan><tspan dy="4.2" font-size="9.0">t</tspan><tspan dy="-4.2" font-size="12.5"></tspan><tspan> - T</tspan><tspan dy="4.2" font-size="9.0">t</tspan><tspan dy="-4.2" font-size="12.5"></tspan></text><text x="278.0" y="186" font-size="12.5" fill="#16191d" font-weight="normal" text-anchor="start" font-family="DejaVu Sans Mono, Consolas, monospace"><tspan>S</tspan><tspan dy="4.2" font-size="9.0">j</tspan><tspan dy="-4.2" font-size="12.5"></tspan><tspan>=mean d (t mod m=j)</tspan></text><text x="278.0" y="208" font-size="12.5" fill="#16191d" font-weight="normal" text-anchor="start" font-family="DejaVu Sans Mono, Consolas, monospace"><tspan>re-centred: sum S</tspan><tspan dy="4.2" font-size="9.0">j</tspan><tspan dy="-4.2" font-size="12.5"></tspan><tspan>=0</tspan></text><line x1="242.0" y1="182.0" x2="258.0" y2="182.0" stroke="#1f77b4" stroke-width="1.5"/><path d="M258.0,178.0 L258.0,186.0 L266.0,182.0 Z" fill="#1f77b4"/><rect x="490.0" y="116" width="200" height="132" rx="9" fill="#ffffff" stroke="#16191d"/><rect x="490.0" y="116" width="200" height="26" rx="9" fill="#1f77b4"/><rect x="490.0" y="130" width="200" height="12" fill="#1f77b4"/><text x="501.0" y="134" font-size="11.5" fill="#ffffff" font-weight="bold" text-anchor="start" font-family="NanumGothic, Helvetica, Arial, sans-serif">3. Residual + AR(1)</text><text x="502.0" y="164" font-size="12.5" fill="#16191d" font-weight="normal" text-anchor="start" font-family="DejaVu Sans Mono, Consolas, monospace"><tspan>r</tspan><tspan dy="4.2" font-size="9.0">t</tspan><tspan dy="-4.2" font-size="12.5"></tspan><tspan> = d</tspan><tspan dy="4.2" font-size="9.0">t</tspan><tspan dy="-4.2" font-size="12.5"></tspan><tspan> - S</tspan><tspan dy="4.2" font-size="9.0">t mod m</tspan><tspan dy="-4.2" font-size="12.5"></tspan></text><text x="502.0" y="186" font-size="12.5" fill="#16191d" font-weight="normal" text-anchor="start" font-family="DejaVu Sans Mono, Consolas, monospace"><tspan>rho = Sr</tspan><tspan dy="4.2" font-size="9.0">t</tspan><tspan dy="-4.2" font-size="12.5"></tspan><tspan>r</tspan><tspan dy="4.2" font-size="9.0">t-1</tspan><tspan dy="-4.2" font-size="12.5"></tspan><tspan> / Sr</tspan><tspan dy="4.2" font-size="9.0">t</tspan><tspan dy="-4.2" font-size="12.5"></tspan><tspan dy="-4.2" font-size="9.0">2</tspan><tspan dy="4.2" font-size="12.5"></tspan></text><text x="502.0" y="208" font-size="12.5" fill="#16191d" font-weight="normal" text-anchor="start" font-family="DejaVu Sans Mono, Consolas, monospace"><tspan>rho in [0, 0.95]</tspan></text><line x1="466.0" y1="182.0" x2="482.0" y2="182.0" stroke="#1f77b4" stroke-width="1.5"/><path d="M482.0,178.0 L482.0,186.0 L490.0,182.0 Z" fill="#1f77b4"/><rect x="714.0" y="116" width="200" height="132" rx="9" fill="#ffffff" stroke="#16191d"/><rect x="714.0" y="116" width="200" height="26" rx="9" fill="#1f77b4"/><rect x="714.0" y="130" width="200" height="12" fill="#1f77b4"/><text x="725.0" y="134" font-size="11.5" fill="#ffffff" font-weight="bold" text-anchor="start" font-family="NanumGothic, Helvetica, Arial, sans-serif">4. Point forecast</text><text x="726.0" y="164" font-size="12.5" fill="#16191d" font-weight="normal" text-anchor="start" font-family="DejaVu Sans Mono, Consolas, monospace"><tspan>y</tspan><tspan>^</tspan><tspan dy="4.2" font-size="9.0">n-1+h</tspan><tspan dy="-4.2" font-size="12.5"></tspan><tspan> = T</tspan><tspan dy="4.2" font-size="9.0">n-1+h</tspan><tspan dy="-4.2" font-size="12.5"></tspan></text><text x="726.0" y="186" font-size="12.5" fill="#16191d" font-weight="normal" text-anchor="start" font-family="DejaVu Sans Mono, Consolas, monospace"><tspan> + S</tspan><tspan dy="4.2" font-size="9.0">(n-1+h) mod m</tspan><tspan dy="-4.2" font-size="12.5"></tspan></text><text x="726.0" y="208" font-size="12.5" fill="#16191d" font-weight="normal" text-anchor="start" font-family="DejaVu Sans Mono, Consolas, monospace"><tspan> + rho</tspan><tspan dy="-4.2" font-size="9.0">h</tspan><tspan dy="4.2" font-size="12.5"></tspan><tspan>.r</tspan><tspan dy="4.2" font-size="9.0">n-1</tspan><tspan dy="-4.2" font-size="12.5"></tspan></text><line x1="690.0" y1="182.0" x2="706.0" y2="182.0" stroke="#1f77b4" stroke-width="1.5"/><path d="M706.0,178.0 L706.0,186.0 L714.0,182.0 Z" fill="#1f77b4"/><rect x="938.0" y="116" width="200" height="132" rx="9" fill="#ffffff" stroke="#16191d"/><rect x="938.0" y="116" width="200" height="26" rx="9" fill="#1f77b4"/><rect x="938.0" y="130" width="200" height="12" fill="#1f77b4"/><text x="949.0" y="134" font-size="11.5" fill="#ffffff" font-weight="bold" text-anchor="start" font-family="NanumGothic, Helvetica, Arial, sans-serif">5. 95% interval</text><text x="950.0" y="164" font-size="12.5" fill="#16191d" font-weight="normal" text-anchor="start" font-family="DejaVu Sans Mono, Consolas, monospace"><tspan>RMSE: 1-step backtest</tspan></text><text x="950.0" y="186" font-size="12.5" fill="#16191d" font-weight="normal" text-anchor="start" font-family="DejaVu Sans Mono, Consolas, monospace"><tspan>PI = y</tspan><tspan>^</tspan><tspan> +/- 1.96.RMSE</tspan></text><text x="950.0" y="208" font-size="12.5" fill="#16191d" font-weight="normal" text-anchor="start" font-family="DejaVu Sans Mono, Consolas, monospace"><tspan>PICP ~ 0.93-0.98</tspan></text><line x1="914.0" y1="182.0" x2="930.0" y2="182.0" stroke="#1f77b4" stroke-width="1.5"/><path d="M930.0,178.0 L930.0,186.0 L938.0,182.0 Z" fill="#1f77b4"/><line x1="590.0" y1="248" x2="590.0" y2="280" stroke="#d62728" stroke-width="1.5"/><path d="M586.0,280 L594.0,280 L590.0,288 Z" fill="#d62728"/><text x="602.0" y="274" font-size="11" fill="#454b52" font-weight="italic" text-anchor="start" font-family="DejaVu Sans">forecast peak feeds the optimizer</text><text x="40" y="312" font-size="12.5" fill="#d62728" font-weight="bold" text-anchor="start" font-family="DejaVu Sans">B. Resizing  —  exact integer program over a bounded space (per resource: vCPU, memory blocks)</text><rect x="43.0" y="324" width="254" height="132" rx="9" fill="#ffffff" stroke="#16191d"/><rect x="43.0" y="324" width="254" height="26" rx="9" fill="#d62728"/><rect x="43.0" y="338" width="254" height="12" fill="#d62728"/><text x="54.0" y="342" font-size="11.5" fill="#ffffff" font-weight="bold" text-anchor="start" font-family="NanumGothic, Helvetica, Arial, sans-serif">6. Robust peak</text><text x="55.0" y="372" font-size="12.5" fill="#16191d" font-weight="normal" text-anchor="start" font-family="DejaVu Sans Mono, Consolas, monospace"><tspan>x = p95 of forecast</tspan></text><text x="55.0" y="394" font-size="12.5" fill="#16191d" font-weight="normal" text-anchor="start" font-family="DejaVu Sans Mono, Consolas, monospace"><tspan>rank = ceil(0.95.N)</tspan></text><text x="55.0" y="416" font-size="12.5" fill="#16191d" font-weight="normal" text-anchor="start" font-family="DejaVu Sans Mono, Consolas, monospace"><tspan>(nearest-rank, not max)</tspan></text><rect x="323.0" y="324" width="254" height="132" rx="9" fill="#ffffff" stroke="#16191d"/><rect x="323.0" y="324" width="254" height="26" rx="9" fill="#d62728"/><rect x="323.0" y="338" width="254" height="12" fill="#d62728"/><text x="334.0" y="342" font-size="11.5" fill="#ffffff" font-weight="bold" text-anchor="start" font-family="NanumGothic, Helvetica, Arial, sans-serif">7. Load (in units)</text><text x="335.0" y="372" font-size="12.5" fill="#16191d" font-weight="normal" text-anchor="start" font-family="DejaVu Sans Mono, Consolas, monospace"><tspan>L = (x/100).u</tspan><tspan dy="4.2" font-size="9.0">cur</tspan><tspan dy="-4.2" font-size="12.5"></tspan><tspan>.g</tspan></text><text x="335.0" y="394" font-size="12.5" fill="#16191d" font-weight="normal" text-anchor="start" font-family="DejaVu Sans Mono, Consolas, monospace"><tspan>g = 1.2 (safety margin)</tspan></text><text x="335.0" y="416" font-size="12.5" fill="#16191d" font-weight="normal" text-anchor="start" font-family="DejaVu Sans Mono, Consolas, monospace"><tspan>u</tspan><tspan dy="4.2" font-size="9.0">cur</tspan><tspan dy="-4.2" font-size="12.5"></tspan><tspan>: current units</tspan></text><line x1="297.0" y1="390.0" x2="315.0" y2="390.0" stroke="#d62728" stroke-width="1.5"/><path d="M315.0,386.0 L315.0,394.0 L323.0,390.0 Z" fill="#d62728"/><rect x="603.0" y="324" width="254" height="132" rx="9" fill="#ffffff" stroke="#16191d"/><rect x="603.0" y="324" width="254" height="26" rx="9" fill="#d62728"/><rect x="603.0" y="338" width="254" height="12" fill="#d62728"/><text x="614.0" y="342" font-size="11.5" fill="#ffffff" font-weight="bold" text-anchor="start" font-family="NanumGothic, Helvetica, Arial, sans-serif">8. Integer program</text><text x="615.0" y="372" font-size="12.5" fill="#16191d" font-weight="normal" text-anchor="start" font-family="DejaVu Sans Mono, Consolas, monospace"><tspan>minimise  u</tspan></text><text x="615.0" y="394" font-size="12.5" fill="#16191d" font-weight="normal" text-anchor="start" font-family="DejaVu Sans Mono, Consolas, monospace"><tspan>s.t.  L &lt;= t.u</tspan></text><text x="615.0" y="416" font-size="12.5" fill="#16191d" font-weight="normal" text-anchor="start" font-family="DejaVu Sans Mono, Consolas, monospace"><tspan>t=0.65, u in {1..u</tspan><tspan>_</tspan><tspan>cur}</tspan></text><line x1="577.0" y1="390.0" x2="595.0" y2="390.0" stroke="#d62728" stroke-width="1.5"/><path d="M595.0,386.0 L595.0,394.0 L603.0,390.0 Z" fill="#d62728"/><rect x="883.0" y="324" width="254" height="132" rx="9" fill="#ffffff" stroke="#16191d"/><rect x="883.0" y="324" width="254" height="26" rx="9" fill="#d62728"/><rect x="883.0" y="338" width="254" height="12" fill="#d62728"/><text x="894.0" y="342" font-size="11.5" fill="#ffffff" font-weight="bold" text-anchor="start" font-family="NanumGothic, Helvetica, Arial, sans-serif">9. Allocation + cost</text><text x="895.0" y="372" font-size="12.5" fill="#16191d" font-weight="normal" text-anchor="start" font-family="DejaVu Sans Mono, Consolas, monospace"><tspan>u* = min(u</tspan><tspan dy="4.2" font-size="9.0">cur</tspan><tspan dy="-4.2" font-size="12.5"></tspan><tspan>, ceil(L/t))</tspan></text><text x="895.0" y="394" font-size="12.5" fill="#16191d" font-weight="normal" text-anchor="start" font-family="DejaVu Sans Mono, Consolas, monospace"><tspan>M* = ceil(L</tspan><tspan dy="4.2" font-size="9.0">m</tspan><tspan dy="-4.2" font-size="12.5"></tspan><tspan>/t).256MB</tspan></text><text x="895.0" y="416" font-size="12.5" fill="#16191d" font-weight="normal" text-anchor="start" font-family="DejaVu Sans Mono, Consolas, monospace"><tspan>save = avg D/cur .100%</tspan></text><line x1="857.0" y1="390.0" x2="875.0" y2="390.0" stroke="#d62728" stroke-width="1.5"/><path d="M875.0,386.0 L875.0,394.0 L883.0,390.0 Z" fill="#d62728"/><text x="590.0" y="486" font-size="12.5" fill="#16191d" font-weight="bold" text-anchor="middle" font-family="DejaVu Sans">-&gt; snap to GCP machine type (E2 / N2 / C2 / C3), budget-guarded resize</text><text x="590.0" y="644" font-size="10.5" fill="#454b52" font-weight="normal" text-anchor="middle" font-family="DejaVu Sans">Figure. MetricLens end-to-end computation. m = seasonal period (24 for hourly). Every equation is the exact expression evaluated in core.forecaster / core.optimizer.</text></svg>